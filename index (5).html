<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Audit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0a;
  --surface: #161614;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e6df;
  --text2: #8a8880;
  --text3: #44423e;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.10);
  --red: #ff6b6b;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Background grid */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,240,96,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,240,96,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.bg-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,240,96,0.04) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Main container */
.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 24px;
  width: 100%;
  max-width: 560px;
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Logo / Brand */
.brand-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.brand-name {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  line-height: 1.1;
}

.brand-name span {
  color: var(--accent);
}

.brand-sub {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 56px;
}

/* Mode cards */
.mode-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 32px;
}

.mode-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px 20px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
}

.mode-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: 16px;
}

.mode-card.korea::before {
  background: radial-gradient(circle at 50% 0%, rgba(200,240,96,0.08) 0%, transparent 70%);
}

.mode-card.global::before {
  background: radial-gradient(circle at 50% 0%, rgba(96,180,240,0.08) 0%, transparent 70%);
}

.mode-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.22);
}

.mode-card:hover::before { opacity: 1; }

.mode-card.korea:hover { border-color: rgba(200,240,96,0.35); }
.mode-card.global:hover { border-color: rgba(96,180,240,0.35); }

.card-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.korea .card-icon { background: rgba(200,240,96,0.1); }
.global .card-icon { background: rgba(96,180,240,0.1); }

.card-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.korea .card-title { color: var(--accent); }
.global .card-title { color: #60b4f0; }

.card-desc {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.6;
  text-align: center;
}

.card-badge {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 20px;
  margin-top: 4px;
}

.korea .card-badge {
  background: rgba(200,240,96,0.1);
  color: var(--accent);
  border: 1px solid rgba(200,240,96,0.2);
}

.global .card-badge {
  background: rgba(96,180,240,0.1);
  color: #60b4f0;
  border: 1px solid rgba(96,180,240,0.2);
}

.card-arrow {
  position: absolute;
  bottom: 14px;
  right: 16px;
  font-size: 14px;
  opacity: 0.25;
  transition: opacity 0.2s, transform 0.2s;
}

.mode-card:hover .card-arrow {
  opacity: 0.7;
  transform: translateX(3px);
}

/* Footer note */
.footer-note {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.footer-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text3);
}

/* Date */
.session-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 48px;
}

@media (max-width: 480px) {
  .mode-cards { grid-template-columns: 1fr; }
  .brand-name { font-size: 26px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">
  <div class="brand-tag">Inventory Audit System</div>
  <div class="brand-name">재고 조사<span>.</span></div>
  <div class="session-info" id="session-date"></div>

  <div class="mode-cards">
    <a class="mode-card korea" href="korea.html">
      <div class="card-icon">🇰🇷</div>
      <div class="card-title">Korea</div>
      <div class="card-desc">영업 중 카운팅<br>판매 차감 후 최종 확정</div>
      <div class="card-badge">KOREA MODE</div>
      <div class="card-arrow">→</div>
    </a>

    <a class="mode-card global" href="global.html">
      <div class="card-icon">🌐</div>
      <div class="card-title">Global</div>
      <div class="card-desc">마감 후 카운팅<br>즉시 재고조사 완료</div>
      <div class="card-badge">GLOBAL MODE</div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="footer-note">
    <span>Firebase 실시간 동기화</span>
    <div class="footer-dot"></div>
    <span>멀티 디바이스 지원</span>
    <div class="footer-dot"></div>
    <span>xlsx Export</span>
  </div>
</div>

<script>
  const d = new Date();
  document.getElementById('session-date').textContent =
    d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
</script>
</body>
</html>
